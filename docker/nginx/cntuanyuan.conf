# 团圆寻亲系统 - Nginx 后端 API 配置
# 此配置仅包含后端 API 服务，无前端静态资源

# ============================================
# 后端 API 服务
# ============================================
upstream backend_api {
    server 127.0.0.1:8080;
    # 负载均衡配置（如需要）
    # server 127.0.0.1:8081;
    # server 127.0.0.1:8082;
}

# HTTP 80 端口 - 重定向到 HTTPS
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 443 端口 - 后端 API 专用配置
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    
    # SSL 证书配置（请替换为实际路径）
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 日志配置
    access_log /var/log/nginx/cntuanyuan_access.log;
    error_log /var/log/nginx/cntuanyuan_error.log;
    
    # 上传文件访问
    location /uploads/ {
        alias /var/www/cntuanyuan/backend/uploads/;
        add_header Access-Control-Allow-Origin *;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # ============================================
    # 后端 API 反向代理（主要配置）
    # ============================================
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 大文件上传配置
        client_max_body_size 100M;
        proxy_request_buffering off;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    # 根路径返回 API 状态
    location = / {
        return 200 '{"status":"ok","service":"cntuanyuan-api","version":"2.0"}';
        add_header Content-Type application/json;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 错误页面
    location = /50x.html {
        root /var/www/cntuanyuan/error;
        internal;
    }
}
