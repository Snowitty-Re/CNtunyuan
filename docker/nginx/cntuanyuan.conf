# 团圆寻亲系统 - Nginx 生产配置
# 部署前请修改：
# 1. server_name 为你的域名
# 2. ssl_certificate 和 ssl_certificate_key 为你的证书路径
# 3. 根据实际情况调整 upstream 地址

# ============================================
# 后端 API 服务
# ============================================
upstream backend_api {
    # Go 后端服务，默认运行在 8080 端口
    # 如果后端在同一台机器上，使用 127.0.0.1:8080
    # 如果后端在 Docker 中，使用容器名或宿主机 IP
    server 127.0.0.1:8080;
    
    # 如果有多个后端实例，可以添加负载均衡
    # server 127.0.0.1:8081;
    # server 127.0.0.1:8082;
}

# HTTP 80 端口 - 重定向到 HTTPS（生产环境）
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    
    # 用于 Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 443 端口 - 主配置
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    
    # SSL 证书配置（请替换为实际证书路径）
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # 临时使用自签名证书（测试环境）
    # ssl_certificate /etc/nginx/ssl/nginx.crt;
    # ssl_certificate_key /etc/nginx/ssl/nginx.key;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 日志配置
    access_log /var/log/nginx/cntuanyuan_access.log;
    error_log /var/log/nginx/cntuanyuan_error.log;
    
    # 上传文件访问
    location /uploads/ {
        alias /var/www/cntuanyuan/backend/uploads/;
        # 允许跨域访问图片
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        # 缓存静态文件
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 前端静态资源 - Web 管理后台
    # 方案1：前端构建后直接部署在 Nginx 目录
    location / {
        root /var/www/cntuanyuan/web-new/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ============================================
    # 后端 API 反向代理
    # ============================================
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲区设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }
    
    # 文件上传/下载（大文件处理）
    location /api/v1/upload {
        proxy_pass http://backend_api/api/v1/upload;
        client_max_body_size 100M;
        proxy_request_buffering off;
        proxy_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 错误页面
    location = /50x.html {
        root /var/www/cntuanyuan/error;
        internal;
    }
}

